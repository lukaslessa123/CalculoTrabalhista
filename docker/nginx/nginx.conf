server {
    listen 80;
    server_name calculo.trabalhadorbrasileiro.com.br www.calculo.trabalhadorbrasileiro.com.br;

    root $RAILS_ROOT/public;

    # Define where Nginx should write its logs
    access_log $RAILS_ROOT/log/nginx.access.log;
    error_log $RAILS_ROOT/log/nginx.error.log;

    location / {
        proxy_pass http://unix:/rails/tmp/sockets/puma.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/acme-challenge/ {
        root $RAILS_ROOT/certbot;
    }
}

server {
    listen 443 ssl;
    server_name calculo.trabalhadorbrasileiro.com.br www.calculo.trabalhadorbrasileiro.com.br;

    ssl_certificate /etc/letsencrypt/live/www.calculo.trabalhadorbrasileiro.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.calculo.trabalhadorbrasileiro.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://unix:/rails/tmp/sockets/puma.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
